<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presence Setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: #333;
    }
    input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    input:focus { outline: none; border-color: #1a1a1a; }
    button {
      width: 100%;
      padding: 0.85rem;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
    .error {
      color: #c00;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      padding: 0.5rem 0.75rem;
      background: #fff0f0;
      border-radius: 6px;
    }
    .success-msg {
      color: #080;
      font-size: 0.9rem;
      margin-top: 1rem;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    {% if saved %}
      <h1>Connected!</h1>
      <p class="success-msg">
        WiFi credentials saved.<br>
        Presence is rebooting and will join your network in about 60 seconds.
      </p>
    {% else %}
      <h1>Presence Setup</h1>
      <p class="subtitle">Connect Presence to your WiFi network.</p>
      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
      <form method="POST" action="/save">
        <label for="ssid">WiFi Network Name</label>
        <input type="text" id="ssid" name="ssid" placeholder="MyNetwork"
               autocomplete="off" autocapitalize="none" required>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••"
               autocomplete="current-password">
        <button type="submit">Connect</button>
      </form>
    {% endif %}
  </div>
</body>
</html>
